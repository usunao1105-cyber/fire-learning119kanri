<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>消防団活動支援マップ</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet (地図ライブラリ) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- QRCode.js (QRコード生成用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    /* 地図の高さ調整 */
    #map { z-index: 10; }
    /* チャットエリアのスクロールバーを隠す */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 h-screen overflow-hidden flex flex-col">

  <!-- ヘッダー (消防団向けのオレンジ色) -->
  <header class="bg-orange-600 text-white p-3 shadow-md flex justify-between items-center z-20">
    <div class="flex items-center">
      <span class="text-xl mr-2">🚒</span>
      <h1 class="text-lg font-bold">消防団活動支援マップ</h1>
    </div>
    <div class="flex items-center space-x-3">
      <div id="status-badge" class="bg-gray-500 text-xs px-2 py-1 rounded-full font-bold">待機中</div>
      <button id="btn-logout" class="hidden bg-red-600 hover:bg-red-700 text-white text-xs px-2 py-1 rounded shadow transition duration-200" title="ログアウト">
        活動終了
      </button>
    </div>
  </header>

  <!-- メインコンテンツ（初期画面） -->
  <div id="setup-screen" class="flex-1 flex flex-col items-center justify-center p-6 bg-white overflow-y-auto z-30 relative">
    <h2 class="text-2xl font-bold mb-6 text-orange-800">活動開始</h2>
    
    <button id="btn-start-hq" class="w-full max-w-sm bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 px-4 rounded-lg shadow-lg mb-4 text-lg transition duration-200">
      🏢 新規事案の立ち上げ (本部)
    </button>
    
    <div class="my-4 text-gray-400 font-bold">または</div>
    
    <div class="w-full max-w-sm border-2 border-dashed border-gray-300 p-6 rounded-lg text-center">
      <p class="text-sm text-gray-600 mb-4">現場の団員は、本部から送られたURLを開くか、QRコードを読み込んでください。</p>
      <div class="text-4xl text-gray-300">📱🔍</div>
    </div>
  </div>

  <!-- 本部情報入力画面 (本部用) -->
  <div id="hq-setup-screen" class="fixed inset-0 bg-white z-40 flex flex-col items-center justify-center p-6 hidden">
    <h2 class="text-2xl font-bold mb-2 text-orange-800">本部情報の入力</h2>
    <p class="text-sm text-gray-600 mb-6">活動を統括する本部の情報を設定します。</p>
    
    <div class="w-full max-w-sm space-y-4">
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2">本部名称 <span class="text-red-500 text-xs">必須</span></label>
        <input type="text" id="hq-input-name" class="shadow appearance-none border rounded w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" value="現地指揮本部" placeholder="例: 〇〇分団 指揮本部">
      </div>
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2">現場指揮官 / 無線 (任意)</label>
        <input type="text" id="hq-input-memo" class="shadow appearance-none border rounded w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="例: 分団長 山田 / 無線: 本部">
      </div>
      <div class="flex space-x-3 mt-6">
        <button id="btn-cancel-hq" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 px-4 rounded-lg transition duration-200">
          戻る
        </button>
        <button id="btn-start-hq-confirm" class="flex-1 bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition duration-200">
          運用開始
        </button>
      </div>
    </div>
  </div>

  <!-- QRコード・共有表示モーダル (本部用) -->
  <div id="modal-qr" class="fixed inset-0 bg-black bg-opacity-70 z-[600] flex items-center justify-center hidden">
    <div class="bg-white p-6 rounded-lg shadow-xl text-center max-w-sm w-full relative">
      <button id="btn-close-qr" class="absolute top-2 right-2 text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
      <h3 class="text-lg font-bold mb-2 text-orange-800">団員追加 (共有)</h3>
      <p class="text-xs text-gray-600 mb-4">カメラで読み込ませるか、URLを送信してください</p>
      
      <div id="qrcode-container" class="flex justify-center bg-white p-2 mb-2 border-2 border-gray-200 rounded"></div>
      <div class="text-xs text-gray-500 break-all bg-gray-100 p-2 rounded mb-4" id="share-url"></div>
      
      <!-- 共有ボタン -->
      <div class="flex space-x-2">
        <button id="btn-share-line" class="flex-1 bg-[#06C755] hover:bg-[#05b34c] text-white font-bold py-2 px-2 rounded-lg text-sm flex items-center justify-center">
          💬 LINEで送る
        </button>
        <button id="btn-copy-url" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-2 rounded-lg text-sm flex items-center justify-center">
          📄 URLコピー
        </button>
      </div>
    </div>
  </div>

  <!-- 参加情報入力画面 (現場隊員用) -->
  <div id="join-screen" class="fixed inset-0 bg-white z-40 flex flex-col items-center p-6 hidden overflow-y-auto">
    <div class="w-full max-w-sm my-auto py-6">
      <h2 class="text-2xl font-bold mb-2 text-orange-800 text-center">活動に参加</h2>
      <p class="text-sm text-gray-600 mb-6 text-center">所属を入力して現場に合流します。</p>
      
      <div class="space-y-4">
        <div>
          <label class="block text-gray-700 text-sm font-bold mb-1">名称 (所属・氏名など) <span class="text-red-500 text-xs">必須</span></label>
          <input type="text" id="input-name" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="例: 第1分団 第1部 ポンプ車">
        </div>
        <div>
          <label class="block text-gray-700 text-sm font-bold mb-1">地図上の名称 (短く) <span class="text-red-500 text-xs">必須</span></label>
          <input type="text" id="input-short-name" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="例: 1分団-P1">
        </div>
        <div>
          <label class="block text-gray-700 text-sm font-bold mb-1">ピンの色</label>
          <div class="flex space-x-4 justify-center py-2">
            <label class="cursor-pointer">
              <input type="radio" name="pin-color" value="red" checked class="hidden peer">
              <div class="w-10 h-10 rounded-full bg-red-500 peer-checked:ring-4 ring-red-300 shadow-md"></div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" name="pin-color" value="blue" class="hidden peer">
              <div class="w-10 h-10 rounded-full bg-blue-500 peer-checked:ring-4 ring-blue-300 shadow-md"></div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" name="pin-color" value="green" class="hidden peer">
              <div class="w-10 h-10 rounded-full bg-green-500 peer-checked:ring-4 ring-green-300 shadow-md"></div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" name="pin-color" value="orange" class="hidden peer">
              <div class="w-10 h-10 rounded-full bg-orange-500 peer-checked:ring-4 ring-orange-300 shadow-md"></div>
            </label>
          </div>
        </div>
        <button id="btn-join" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg mt-4 transition duration-200">
          現場に合流する
        </button>
      </div>
    </div>
  </div>

  <!-- マップ＆チャット画面 -->
  <div id="map-chat-screen" class="flex-1 flex flex-col md:flex-row hidden relative h-full">
    
    <!-- マップエリア -->
    <div class="h-[60%] md:flex-1 md:h-full relative">
      <div id="map" class="absolute inset-0 z-10"></div>
      
      <!-- 本部用ツールボタン群 -->
      <div id="hq-tools" class="absolute top-2 right-2 z-[400] flex flex-col space-y-2 hidden">
        <button id="btn-my-location-hq" class="bg-white p-2 rounded shadow-md border border-gray-300 hover:bg-gray-100 text-orange-600 font-bold" title="現在地に戻る">
          📍 現在地
        </button>
        <button id="btn-reconnect-hq" class="bg-white p-2 rounded shadow-md border border-gray-300 hover:bg-gray-100 text-blue-600 font-bold" title="GPS再接続">
          🛰️ 再接続
        </button>
        <button id="btn-show-qr" class="bg-white p-2 rounded shadow-md border border-gray-300 hover:bg-gray-100" title="共有・QRコード">
          📱 共有
        </button>
        <button id="btn-toggle-members" class="bg-white p-2 rounded shadow-md border border-gray-300 hover:bg-gray-100" title="隊員一覧">
          👥 一覧
        </button>
      </div>

      <!-- 現場用ツールボタン群 -->
      <div id="field-tools" class="absolute top-2 right-2 z-[400] flex flex-col space-y-2 hidden">
        <button id="btn-my-location" class="bg-white p-2 rounded shadow-md border border-gray-300 hover:bg-gray-100 text-orange-600 font-bold" title="現在地に戻る">
          📍 現在地
        </button>
        <button id="btn-reconnect" class="bg-white p-2 rounded shadow-md border border-gray-300 hover:bg-gray-100 text-blue-600 font-bold" title="GPS再接続">
          🛰️ 再接続
        </button>
        <button id="btn-leave" class="bg-white p-2 rounded shadow-md border border-red-300 text-red-600 hover:bg-red-50" title="退出する">
          🚪 退出
        </button>
      </div>
    </div>

    <!-- 隊員一覧パネル (本部用) -->
    <div id="members-panel" class="absolute top-0 right-0 w-64 h-2/3 bg-white shadow-xl z-[500] transform translate-x-full transition-transform duration-300 flex flex-col border-l border-gray-200">
      <div class="bg-orange-100 p-3 font-bold text-orange-800 flex justify-between items-center border-b">
        活動メンバー
        <button id="btn-close-members" class="text-gray-500 hover:text-gray-800">&times;</button>
      </div>
      <div id="members-list" class="flex-1 overflow-y-auto p-2 space-y-2 text-sm">
        <!-- 隊員リストがここに入る -->
      </div>
    </div>

    <!-- チャットエリア -->
    <div class="h-[40%] md:h-full md:w-80 bg-white flex flex-col border-t md:border-t-0 md:border-l border-gray-300 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] md:shadow-[-4px_0_6px_-1px_rgba(0,0,0,0.1)]">
      
      <!-- チャットヘッダー -->
      <div class="bg-orange-50 p-2 font-bold text-orange-800 flex justify-between items-center border-b border-orange-100 text-sm">
        <span>活動ログ</span>
        <button id="btn-export-chat" class="bg-orange-600 hover:bg-orange-700 text-white text-xs py-1 px-2 rounded shadow transition-colors flex items-center">
          📄 ログコピー
        </button>
      </div>

      <!-- メッセージ表示部 -->
      <div id="chat-messages" class="flex-1 overflow-y-auto p-3 space-y-3 no-scrollbar bg-gray-50">
        <div class="text-center text-xs text-gray-400 my-2">-- 通信ログ開始 --</div>
      </div>
      <!-- 入力部 -->
      <div class="p-2 bg-gray-200 flex items-center space-x-2 pb-safe relative">
        <input type="text" id="chat-input" class="flex-1 rounded-full py-2 px-4 border border-gray-300 focus:outline-none focus:border-orange-500 text-sm" placeholder="状況を送信...">
        <button id="btn-send-chat" class="bg-orange-600 text-white rounded-full p-2 w-10 h-10 flex items-center justify-center hover:bg-orange-700 shadow flex-shrink-0">
          ➤
        </button>
      </div>
    </div>
  </div>

  <!-- 退出確認モーダル -->
  <div id="modal-leave" class="fixed inset-0 bg-black bg-opacity-50 z-[600] flex items-center justify-center hidden">
    <div class="bg-white p-6 rounded-lg shadow-xl text-center max-w-sm w-full relative">
      <h3 class="text-lg font-bold mb-2 text-gray-800">活動を終了（退出）しますか？</h3>
      <p class="text-xs text-gray-500 mb-6">退出すると、地図上からあなたの位置が消去されます。</p>
      <div class="flex space-x-3">
        <button id="btn-cancel-leave" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded transition duration-200">
          キャンセル
        </button>
        <button id="btn-confirm-leave" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition duration-200">
          退出する
        </button>
      </div>
    </div>
  </div>

  <!-- Firebase 連携 メインプログラム -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, setDoc, doc, addDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const isPreview = typeof __firebase_config !== 'undefined';

    // 🚨 ご自身のFirebase設定
    const firebaseConfig = {
      apiKey: "AIzaSyAW2Auv3KzKuT8EXJZaY_2bQzBfvYkn6y4",
      authDomain: "rescuemap-a5d3a.firebaseapp.com",
      projectId: "rescuemap-a5d3a",
      storageBucket: "rescuemap-a5d3a.firebasestorage.app",
      messagingSenderId: "1049099260873",
      appId: "1:1049099260873:web:9b20c7beb7d5d27ea04e18"
    };

    let appId = "default-app-id";
    let activeConfig = firebaseConfig;

    if (isPreview) {
      activeConfig = JSON.parse(__firebase_config);
      appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    }

    const app = initializeApp(activeConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function getCollectionPath(type) {
      if (isPreview) {
        return `artifacts/${appId}/public/data/operations_${operationId}_${type}`;
      }
      return `operations/${operationId}/${type}`;
    }

    // グローバル変数
    let map = null;
    let markers = {}; 
    let currentUser = null;
    let currentRole = null; 
    let operationId = null; 
    let myName = "本部";
    let myShortName = "本部"; 
    let myColor = "red"; 
    let watchId = null;
    let fullChatLog = [];

    const setupScreen = document.getElementById('setup-screen');
    const joinScreen = document.getElementById('join-screen');
    const mapChatScreen = document.getElementById('map-chat-screen');
    const statusBadge = document.getElementById('status-badge');
    const hqTools = document.getElementById('hq-tools');
    const fieldTools = document.getElementById('field-tools');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    
    const urlParams = new URLSearchParams(window.location.search);
    const urlOpId = urlParams.get('op');

    function init() {
      if (urlOpId) {
        operationId = urlOpId;
        setupScreen.classList.add('hidden');
        joinScreen.classList.remove('hidden');
      }
    }

    async function login() {
      try {
        if (isPreview && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          try {
            const userCredential = await signInWithCustomToken(auth, __initial_auth_token);
            currentUser = userCredential.user;
          } catch (tokenError) {
            console.warn("カスタムトークンが無効です。匿名ログインに切り替えます:", tokenError);
            const userCredential = await signInAnonymously(auth);
            currentUser = userCredential.user;
          }
        } else {
          const userCredential = await signInAnonymously(auth);
          currentUser = userCredential.user;
        }
        return currentUser;
      } catch (error) {
        alert("ログインに失敗しました: " + error.message);
        throw error;
      }
    }

    document.getElementById('btn-start-hq').addEventListener('click', () => {
      setupScreen.classList.add('hidden');
      document.getElementById('hq-setup-screen').classList.remove('hidden');
    });

    document.getElementById('btn-cancel-hq').addEventListener('click', () => {
      document.getElementById('hq-setup-screen').classList.add('hidden');
      setupScreen.classList.remove('hidden');
    });

    document.getElementById('btn-start-hq-confirm').addEventListener('click', async () => {
      const nameInput = document.getElementById('hq-input-name').value.trim();
      if (!nameInput) {
        alert("本部名称を入力してください。");
        return;
      }
      const memoInput = document.getElementById('hq-input-memo').value.trim();
      let displayName = nameInput;
      if (memoInput) displayName += ` (${memoInput})`;

      try {
        document.getElementById('btn-start-hq-confirm').textContent = "準備中...";
        await login();
        
        operationId = Math.random().toString(36).substring(2, 8).toUpperCase();
        currentRole = 'hq';
        myName = displayName; 
        myShortName = nameInput; 
        myColor = "red"; 
        
        document.getElementById('hq-setup-screen').classList.add('hidden');
        mapChatScreen.classList.remove('hidden');
        hqTools.classList.remove('hidden');
        statusBadge.textContent = "本部運用中";
        statusBadge.classList.replace('bg-gray-500', 'bg-orange-600');
        document.getElementById('btn-logout').classList.remove('hidden');
        
        initMap();
        startListening();
        startGPS(); 
        showQRCode();
        addChatMessage({senderName: "システム", text: `事案 [${operationId}] を開始しました。`}, "system");
        
      } catch (e) {
        console.error(e);
        document.getElementById('btn-start-hq-confirm').textContent = "運用開始";
      }
    });

    document.getElementById('btn-join').addEventListener('click', async () => {
      const nameInput = document.getElementById('input-name').value.trim();
      const shortNameInput = document.getElementById('input-short-name').value.trim();
      if (!nameInput || !shortNameInput) {
        alert("「名称」と「地図上の名称」は必須入力です。");
        return;
      }
      try {
        document.getElementById('btn-join').textContent = "接続中...";
        await login();
        currentRole = 'field';
        myName = nameInput;
        myShortName = shortNameInput;
        myColor = document.querySelector('input[name="pin-color"]:checked').value;
        
        joinScreen.classList.add('hidden');
        mapChatScreen.classList.remove('hidden');
        fieldTools.classList.remove('hidden');
        statusBadge.textContent = "活動中";
        statusBadge.classList.replace('bg-gray-500', 'bg-orange-600');
        document.getElementById('btn-logout').classList.remove('hidden');
        
        initMap();
        startListening();
        startGPS(); 
        addChatMessage({senderName: "システム", text: `${myName} が活動に参加しました。`}, "system");
      } catch (e) {
        console.error(e);
        document.getElementById('btn-join').textContent = "現場に合流する";
      }
    });

    // 🗺️ 地図の初期化 (Googleマップ航空写真)
    function initMap() {
      map = L.map('map').setView([35.6895, 139.6917], 5);
      
      // Googleマップ航空写真 (ラベル付き) に変更
      L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        attribution: "<a href='https://developers.google.com/maps/documentation' target='_blank'>Google Map</a>",
        maxZoom: 20
      }).addTo(map);

      if (currentRole === 'hq') {
        navigator.geolocation.getCurrentPosition(pos => {
          map.setView([pos.coords.latitude, pos.coords.longitude], 16);
        }, () => {});
      }
    }

    function startGPS() {
      if (!navigator.geolocation) return;
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);

      watchId = navigator.geolocation.watchPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          if (!markers[currentUser.uid]) map.setView([lat, lng], 16);

          try {
            await setDoc(doc(db, getCollectionPath('locations'), currentUser.uid), {
              name: myName,
              shortName: myShortName,
              color: myColor,
              lat: lat,
              lng: lng,
              timestamp: serverTimestamp()
            });
          } catch (e) { console.error("GPS送信エラー", e); }
        },
        (error) => { console.warn('GPSエラー:', error.message); },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
      );
    }

    // GPS再接続機能
    function reconnectGPS() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      startGPS();
      // 現在地へ移動
      navigator.geolocation.getCurrentPosition(pos => {
        map.setView([pos.coords.latitude, pos.coords.longitude], 17);
      }, () => {});
    }

    document.getElementById('btn-reconnect').addEventListener('click', reconnectGPS);
    document.getElementById('btn-reconnect-hq').addEventListener('click', reconnectGPS);
    document.getElementById('btn-my-location').addEventListener('click', reconnectGPS);
    document.getElementById('btn-my-location-hq').addEventListener('click', reconnectGPS);

    // スリープ復帰時にGPS再起動
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === 'visible' && currentUser) {
        reconnectGPS();
      }
    });

    function startListening() {
      const locationsRef = collection(db, getCollectionPath('locations'));
      onSnapshot(locationsRef, (snapshot) => {
        updateMembersList(snapshot.docs); 
        snapshot.docChanges().forEach((change) => {
          const data = change.doc.data();
          const uid = change.doc.id;
          
          if (change.type === "added" || change.type === "modified") {
            if (markers[uid]) {
              markers[uid].setLatLng([data.lat, data.lng]);
            } else {
              const colorCodeMap = { 'blue': '#3b82f6', 'green': '#22c55e', 'orange': '#f97316', 'red': '#ef4444' };
              const pinBgColor = colorCodeMap[data.color] || '#f97316';

              const markerHtml = `
                <div style="
                  position: absolute; bottom: 0; left: 50%; transform: translate(-50%, 0);
                  background-color: white; color: ${pinBgColor}; padding: 4px 12px;
                  border-radius: 8px; font-size: 14px; font-weight: 900; white-space: nowrap;
                  border: 3px solid ${pinBgColor}; box-shadow: 0 3px 6px rgba(0,0,0,0.3);
                ">
                  ${data.shortName || data.name}
                  <div style="position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 8px solid ${pinBgColor};"></div>
                </div>
              `;
              const customIcon = L.divIcon({ className: 'custom-div-icon', html: markerHtml, iconSize: [0, 0], iconAnchor: [0, 8] });
              markers[uid] = L.marker([data.lat, data.lng], {icon: customIcon}).addTo(map);
            }
          }
          if (change.type === "removed") {
            if (markers[uid]) {
              map.removeLayer(markers[uid]);
              delete markers[uid];
            }
          }
        });
      });

      const chatRef = collection(db, getCollectionPath('chat'));
      const chatQuery = query(chatRef, orderBy("timestamp", "asc"));
      
      onSnapshot(chatQuery, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
          if (change.type === "added") {
            const data = change.doc.data();
            let logTime = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            if (data.timestamp && data.timestamp.toDate) logTime = data.timestamp.toDate().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            fullChatLog.push(`[${logTime}] ${data.senderName}\n${data.text || ''}`);

            let type = 'other';
            if (data.senderId === currentUser.uid) type = 'me';
            else if (data.senderId === 'system') type = 'system';
            addChatMessage(data, type); 
          }
        });
      });
    }

    async function sendChat() {
      const text = chatInput.value.trim();
      if (!text) return;
      chatInput.value = ""; 
      try {
        await addDoc(collection(db, getCollectionPath('chat')), {
          senderId: currentUser.uid,
          senderName: myName,
          text: text,
          timestamp: serverTimestamp()
        });
      } catch (e) { console.error("チャット送信エラー", e); }
    }
    document.getElementById('btn-send-chat').addEventListener('click', sendChat);
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChat(); });

    function addChatMessage(data, type) {
      const div = document.createElement('div');
      if (type === 'system') {
        div.className = "text-center text-xs text-gray-500 my-2";
        div.textContent = data.text;
      } else if (type === 'me') {
        div.className = "flex flex-col items-end my-1";
        div.innerHTML = `<span class="text-[10px] text-gray-500 mb-0.5">${data.senderName}</span><div class="bg-orange-500 text-white p-2.5 rounded-lg rounded-tr-none max-w-[85%] text-sm shadow whitespace-pre-wrap">${data.text}</div>`;
      } else {
        div.className = "flex flex-col items-start my-1";
        div.innerHTML = `<span class="text-[10px] text-gray-500 mb-0.5">${data.senderName}</span><div class="bg-white border border-gray-200 text-gray-800 p-2.5 rounded-lg rounded-tl-none max-w-[85%] text-sm shadow whitespace-pre-wrap">${data.text}</div>`;
      }
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function updateMembersList(docs) {
      if (currentRole !== 'hq') return;
      const listDiv = document.getElementById('members-list');
      listDiv.innerHTML = '';
      docs.forEach(docSnap => {
        const data = docSnap.data();
        const item = document.createElement('div');
        item.className = "p-2 border border-gray-200 rounded flex justify-between items-center bg-gray-50 mb-1 font-bold text-gray-800";
        item.textContent = data.name;
        listDiv.appendChild(item);
      });
    }

    document.getElementById('btn-export-chat').addEventListener('click', () => {
      const textToCopy = "【活動ログ】\n\n" + fullChatLog.join('\n\n');
      const textArea = document.createElement("textarea");
      textArea.value = textToCopy;
      document.body.appendChild(textArea);
      textArea.select();
      document.execCommand('copy');
      document.body.removeChild(textArea);
      const btn = document.getElementById('btn-export-chat');
      const originalText = btn.innerHTML;
      btn.innerHTML = "✅ コピー完了";
      setTimeout(() => { btn.innerHTML = originalText; }, 2000);
    });

    // 📱 QRコードと共有機能
    function showQRCode() {
      const modal = document.getElementById('modal-qr');
      const container = document.getElementById('qrcode-container');
      const urlDisplay = document.getElementById('share-url');
      const baseUrl = window.location.href.split('?')[0];
      const joinUrl = `${baseUrl}?op=${operationId}`;
      
      container.innerHTML = ""; 
      // ★変更: サイズを大きくし、模様をシンプルにする設定(CorrectLevel.L)を追加
      new QRCode(container, { 
        text: joinUrl, 
        width: 180, 
        height: 180,
        correctLevel: QRCode.CorrectLevel.L
      });
      urlDisplay.textContent = joinUrl;
      modal.classList.remove('hidden');

      // LINEで共有
      document.getElementById('btn-share-line').onclick = () => {
        const text = encodeURIComponent('消防団活動支援マップ 参加URL:\n' + joinUrl);
        window.open(`https://line.me/R/msg/text/?${text}`, '_blank');
      };

      // URLコピー
      document.getElementById('btn-copy-url').onclick = async () => {
        try {
          await navigator.clipboard.writeText(joinUrl);
          const btn = document.getElementById('btn-copy-url');
          btn.innerHTML = "✅ コピー済";
          setTimeout(() => btn.innerHTML = "📄 URLコピー", 2000);
        } catch (err) {
          // Fallback
          const textArea = document.createElement("textarea");
          textArea.value = joinUrl;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);
          const btn = document.getElementById('btn-copy-url');
          btn.innerHTML = "✅ コピー済";
          setTimeout(() => btn.innerHTML = "📄 URLコピー", 2000);
        }
      };
    }

    document.getElementById('btn-show-qr').addEventListener('click', showQRCode);
    document.getElementById('btn-close-qr').addEventListener('click', () => {
      document.getElementById('modal-qr').classList.add('hidden');
    });

    const membersPanel = document.getElementById('members-panel');
    document.getElementById('btn-toggle-members').addEventListener('click', () => { membersPanel.classList.toggle('translate-x-full'); });
    document.getElementById('btn-close-members').addEventListener('click', () => { membersPanel.classList.add('translate-x-full'); });

    const modalLeave = document.getElementById('modal-leave');
    document.getElementById('btn-logout').addEventListener('click', () => { modalLeave.classList.remove('hidden'); });
    document.getElementById('btn-leave').addEventListener('click', () => { modalLeave.classList.remove('hidden'); });
    document.getElementById('btn-cancel-leave').addEventListener('click', () => { modalLeave.classList.add('hidden'); });
    
    document.getElementById('btn-confirm-leave').addEventListener('click', async () => {
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
      try {
        await deleteDoc(doc(db, getCollectionPath('locations'), currentUser.uid));
        await addDoc(collection(db, getCollectionPath('chat')), {
          senderId: 'system', senderName: 'システム',
          text: currentRole === 'hq' ? '本部が活動を終了しました。' : `${myName} が退出しました。`,
          timestamp: serverTimestamp()
        });
        await signOut(auth);
      } catch (e) { console.error("退出エラー", e); }
      window.location.href = window.location.href.split('?')[0];
    });

    init();
  </script>
</body>
</html>
