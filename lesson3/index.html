<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Squad Tactical Sim - 多部隊合同訓練システム</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body className="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const { useState, useEffect, useRef } = React;

    // =========================================================================
    // Firebase設定 (通信用)
    // =========================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyBENgEnO5E8F56FJKz8bt-I1LVG73I5PAM",
      authDomain: "tactical-commander-sim.firebaseapp.com",
      projectId: "tactical-commander-sim",
      storageBucket: "tactical-commander-sim.firebasestorage.app",
      messagingSenderId: "129443804844",
      appId: "1:129443804844:web:02f5c323b3081db4d1d109"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'multi-squad-sim';
    // =========================================================================

    // --- データ定義（シナリオ・付与イベント） ---
    const scenarioData = {
      buildings: ["木造2階建て一般住宅", "耐火造4階建て共同住宅", "5階建て雑居ビル", "大規模工場（一部危険物貯蔵）", "木造平屋建て空き家", "高層マンション（10階部分）", "地下街飲食店"],
      times: ["深夜（午前2時）", "早朝（午前6時）", "昼間（午後1時）", "夕方（午後6時）", "夜間（午後9時）"],
      weather: ["晴れ・無風・乾燥", "強風（風速10m/s以上）", "大雨", "降雪・路面凍結", "濃霧"],
      conditions: ["1階窓から黒煙と炎が激しく噴出", "2階部分から白煙がにじみ出ている", "10階の窓から白煙が噴出している", "屋上へ延焼の危険大", "建物全体が火の海（最盛期）", "外観上は異常なし、焦げ臭い匂いのみ", "隣接する木造家屋に延焼中"],
      victims: ["逃げ遅れ1名あり（2階寝室）", "情報錯綜、不在の可能性もあるが確証なし", "複数名がベランダで救助を求めている", "全員避難済み（関係者確認）", "不明（要検索）"],
      hazards: ["道路狭隘で消防車進入困難（ホース延長必要）", "最寄りの消火栓が工事中で使用不可", "付近に多数の野次馬で混乱", "プロパンガスボンベへの延焼危険あり", "特になし"],
      // 統裁が任意のタイミングで発火させる負荷リスト
      loadEvents: [
        { id: "e1", title: "要救助者の声", text: "建物内部から「助けて！」という要救助者の声が聞こえる" },
        { id: "e2", title: "小規模爆発", text: "建物内部で「ドーン」という小規模な爆発音が発生する" },
        { id: "e3", title: "風向き急変", text: "風向きが急変し、隣接建物への延焼危険が急激に高まる" },
        { id: "e4", title: "家族パニック", text: "要救助者の家族が現場に駆けつけ、パニック状態で進入しようとする" },
        { id: "e5", title: "崩落の予兆", text: "2階の床（1階の天井）が一部崩落する音がする" },
        { id: "e6", title: "水圧低下", text: "付近の消火栓の水圧が急激に低下する" },
        { id: "e7", title: "新たな出火", text: "これまで煙のなかった別の窓から、新たに濃煙が噴出し始める" },
        { id: "e8", title: "警察情報", text: "現場に到着した警察官から「中に人がいるかもしれない」と情報提供がある" },
        { id: "e9", title: "ガス漏れ音", text: "建物内から「シュー」というガスが漏れるような異音が聞こえる" },
        { id: "e10", title: "熱気の急上昇", text: "活動中の隊員から「熱気が急に強くなった」と緊急無線の報告が入る" }
      ]
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [isInRoom, setIsInRoom] = useState(false);
      
      // ログインフォーム用
      const [roomId, setRoomId] = useState('');
      const [userRoleType, setUserRoleType] = useState('participant');
      const [callsign, setCallsign] = useState('');
      
      // チャットと状態
      const [messages, setMessages] = useState([]); // 全体回線
      const [ctrlMessages, setCtrlMessages] = useState([]); // 統裁裏回線
      const [newMessage, setNewMessage] = useState('');
      const [newCtrlMessage, setNewCtrlMessage] = useState('');
      const [customEventText, setCustomEventText] = useState('');
      
      // ルーム状態
      const [roomState, setRoomState] = useState({
        scenario: null,
        isStarted: false,
        startTime: null,
      });
      const [elapsedTime, setElapsedTime] = useState(0);

      // ファイル添付用状態
      const [attachedFile, setAttachedFile] = useState(null);
      const [fileError, setFileError] = useState('');
      const fileInputRef = useRef(null);

      const mainChatEndRef = useRef(null);
      const ctrlChatEndRef = useRef(null);

      const isController = userRoleType === 'controller';

      // --- 認証 ---
      useEffect(() => {
        const initAuth = async () => {
          try { await signInAnonymously(auth); } catch (e) { console.error(e); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // --- データ取得 ---
      useEffect(() => {
        if (!user || !isInRoom || !roomId) return;
        
        // 全体トランシーバーのリッスン
        const msgsRef = collection(db, 'artifacts', appId, 'public', 'data', `room_${roomId}_main_chat`);
        const unsubMain = onSnapshot(query(msgsRef), (snapshot) => {
          const msgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          msgs.sort((a, b) => (a.timestamp?.toMillis() || 0) - (b.timestamp?.toMillis() || 0));
          setMessages(msgs);
        });

        // 統裁専用裏回線のリッスン (統裁のみ)
        let unsubCtrl = () => {};
        if (isController) {
          const ctrlRef = collection(db, 'artifacts', appId, 'public', 'data', `room_${roomId}_ctrl_chat`);
          unsubCtrl = onSnapshot(query(ctrlRef), (snapshot) => {
            const msgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            msgs.sort((a, b) => (a.timestamp?.toMillis() || 0) - (b.timestamp?.toMillis() || 0));
            setCtrlMessages(msgs);
          });
        }

        // ルーム状態（シナリオ・タイマー）のリッスン
        const stateRef = doc(db, 'artifacts', appId, 'public', 'data', 'room_states', roomId);
        const unsubState = onSnapshot(stateRef, (docSnap) => {
          if (docSnap.exists()) {
            setRoomState(docSnap.data());
          }
        });

        return () => { unsubMain(); unsubCtrl(); unsubState(); };
      }, [user, isInRoom, roomId, isController]);

      // --- タイマー進行 ---
      useEffect(() => {
        let interval;
        if (roomState.isStarted && roomState.startTime) {
          interval = setInterval(() => {
            setElapsedTime(Math.floor((Date.now() - roomState.startTime) / 1000));
          }, 1000);
        } else {
          setElapsedTime(0);
        }
        return () => clearInterval(interval);
      }, [roomState.isStarted, roomState.startTime]);

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      };

      // 自動スクロール
      useEffect(() => { mainChatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);
      useEffect(() => { ctrlChatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [ctrlMessages]);

      // --- ファイル処理 ---
      const compressImage = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = event => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 1000;
              const MAX_HEIGHT = 1000;
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
              } else {
                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
              }
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              resolve(canvas.toDataURL('image/jpeg', 0.7)); // 画質を落として軽量化
            }
          };
          reader.onerror = error => reject(error);
        });
      };

      const readFileAsBase64 = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => resolve(reader.result);
          reader.onerror = error => reject(error);
        });
      };

      const handleFileSelect = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setFileError('');
        // Firestore制限対応（PDFなどは700KB以下を推奨）
        if (!file.type.startsWith('image/') && file.size > 700000) {
          setFileError("PDF等のファイルは700KB以下にしてください。");
          if (fileInputRef.current) fileInputRef.current.value = '';
          return;
        }

        try {
          let fileData;
          if (file.type.startsWith('image/')) {
            fileData = await compressImage(file);
          } else {
            fileData = await readFileAsBase64(file);
          }
          
          setAttachedFile({
            data: fileData,
            name: file.name,
            type: file.type
          });
        } catch (err) {
          console.error("ファイル処理エラー", err);
          setFileError("ファイルの読み込みに失敗しました。");
        }
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      // --- アクション ---
      const updateState = async (updates) => {
        const stateRef = doc(db, 'artifacts', appId, 'public', 'data', 'room_states', roomId);
        await setDoc(stateRef, updates, { merge: true });
      };

      // 全体チャット送信（ファイル添付対応）
      const sendMainMessage = async (e) => {
        e.preventDefault();
        if (!user || (!newMessage.trim() && !attachedFile) || !roomId) return;
        const ref = collection(db, 'artifacts', appId, 'public', 'data', `room_${roomId}_main_chat`);
        
        const msgObj = {
          text: newMessage,
          senderId: user.uid,
          callsign: callsign,
          roleType: userRoleType,
          timestamp: serverTimestamp()
        };

        if (attachedFile) {
          msgObj.fileData = attachedFile.data;
          msgObj.fileName = attachedFile.name;
          msgObj.fileType = attachedFile.type;
        }

        try {
          await addDoc(ref, msgObj);
          setNewMessage('');
          setAttachedFile(null);
        } catch (err) {
          console.error(err);
          setFileError("送信に失敗しました。ファイルサイズが大きすぎる可能性があります。");
        }
      };

      // 統裁裏回線送信
      const sendCtrlMessage = async (e) => {
        e.preventDefault();
        if (!newCtrlMessage.trim() || !isController) return;
        const ref = collection(db, 'artifacts', appId, 'public', 'data', `room_${roomId}_ctrl_chat`);
        await addDoc(ref, {
          text: newCtrlMessage,
          senderId: user.uid,
          callsign: callsign,
          timestamp: serverTimestamp()
        });
        setNewCtrlMessage('');
      };

      // 状況付与
      const triggerEvent = async (text) => {
        const ref = collection(db, 'artifacts', appId, 'public', 'data', `room_${roomId}_main_chat`);
        await addDoc(ref, {
          text: `【状況付与】 ${text}`,
          senderId: 'system',
          callsign: '統裁部',
          roleType: 'system',
          timestamp: serverTimestamp()
        });
        const ctrlRef = collection(db, 'artifacts', appId, 'public', 'data', `room_${roomId}_ctrl_chat`);
        await addDoc(ctrlRef, {
          text: `▶︎ 現場へ状況付与しました: 「${text}」`,
          senderId: 'system',
          callsign: 'SYSTEM',
          timestamp: serverTimestamp()
        });
      };

      // シナリオ生成
      const generateScenario = async () => {
        const random = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const newScenario = {
          building: random(scenarioData.buildings),
          time: random(scenarioData.times),
          weather: random(scenarioData.weather),
          condition: random(scenarioData.conditions),
          victim: random(scenarioData.victims),
          hazard: random(scenarioData.hazards)
        };
        await updateState({ scenario: newScenario, isStarted: false, startTime: null });
      };

      // --- ビューのレンダリング ---
      if (!isInRoom) {
        return (
          <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 font-sans">
            <div className="bg-slate-800 border border-slate-700 rounded-xl p-8 max-w-md w-full shadow-2xl text-white">
              <div className="text-center mb-6">
                <i className="fas fa-network-wired text-4xl text-blue-500 mb-3"></i>
                <h1 className="text-2xl font-black tracking-wider">Multi-Squad Sim</h1>
                <p className="text-slate-400 text-xs mt-1">多部隊合同 訓練シミュレーター</p>
              </div>
              
              <form onSubmit={(e) => { e.preventDefault(); if(roomId && callsign) setIsInRoom(true); }} className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">ROOM ID (共通の合言葉)</label>
                  <input type="text" value={roomId} onChange={(e) => setRoomId(e.target.value)} required
                    className="w-full bg-slate-900 border border-slate-600 rounded px-4 py-2 text-white focus:border-blue-500 outline-none" placeholder="例: Training-01" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">あなたの役割・立場</label>
                  <select value={userRoleType} onChange={(e) => setUserRoleType(e.target.value)}
                    className="w-full bg-slate-900 border border-slate-600 rounded px-4 py-2 text-white focus:border-blue-500 outline-none">
                    <option value="participant">参加隊（現場で活動する部隊・指令室等）</option>
                    <option value="controller">開催側（統裁・コントロール）</option>
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">コールサイン（役職・部隊名）</label>
                  <input type="text" value={callsign} onChange={(e) => setCallsign(e.target.value)} required
                    className="w-full bg-slate-900 border border-slate-600 rounded px-4 py-2 text-white focus:border-blue-500 outline-none" 
                    placeholder={userRoleType === 'controller' ? "例: メイン統裁, サブ統裁1" : "例: 現場指揮官, 第1中隊, 指令センター"} />
                </div>
                <button type="submit" disabled={!user}
                  className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded mt-6 transition disabled:opacity-50">
                  {user ? '訓練ルームに入室' : '接続中...'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen md:h-screen bg-slate-100 font-sans flex flex-col md:overflow-hidden relative">

          {/* ヘッダー */}
          <header className="bg-slate-900 text-white px-4 py-3 shadow-md flex justify-between items-center z-20 shrink-0 sticky top-0 md:static">
            <div className="flex items-center space-x-3">
              <i className="fas fa-network-wired text-xl text-blue-400"></i>
              <h1 className="text-lg font-bold tracking-wider hidden sm:block">Multi-Squad Sim</h1>
              <span className="bg-slate-700 text-xs px-2 py-1 rounded border border-slate-600 font-mono">ROOM: {roomId}</span>
            </div>
            <div className="flex items-center space-x-3">
              <div className={`px-3 py-1 rounded text-xs font-bold border ${isController ? 'bg-indigo-900 border-indigo-700 text-indigo-200' : 'bg-emerald-900 border-emerald-700 text-emerald-200'}`}>
                {isController ? '開催側(統裁)' : '参加隊'} : {callsign}
              </div>
              <button onClick={() => setIsInRoom(false)} className="text-slate-400 hover:text-white transition"><i className="fas fa-sign-out-alt text-lg"></i></button>
            </div>
          </header>

          {/* メインコンテンツ */}
          <main className="flex-1 flex flex-col md:flex-row p-2 gap-2 overflow-y-auto md:overflow-hidden w-full max-w-screen-2xl mx-auto min-h-0">
            
            {/* 1. 左ペイン: 想定状況 & コントロール (統裁のみ機能あり) */}
            <div className={`flex flex-col gap-2 w-full ${isController ? 'md:w-1/4' : 'md:w-1/3'} shrink-0 md:h-full md:overflow-y-auto pb-4 md:pb-2 md:pr-1`}>
              
              {/* タイマーエリア */}
              <div className="bg-slate-800 rounded-lg p-4 text-white shadow flex flex-col items-center justify-center shrink-0">
                <p className="text-xs text-slate-400 font-bold mb-1">訓練経過時間</p>
                <div className={`text-4xl font-mono font-black mb-3 ${roomState.isStarted ? 'text-blue-400' : 'text-slate-300'}`}>
                  {formatTime(elapsedTime)}
                </div>
                {isController && (
                  <div className="flex space-x-2 w-full">
                    <button onClick={() => updateState({ isStarted: !roomState.isStarted, startTime: roomState.startTime || Date.now() })} 
                      className={`flex-1 py-2 rounded font-bold text-xs transition ${roomState.isStarted ? 'bg-amber-600 hover:bg-amber-500' : 'bg-emerald-600 hover:bg-emerald-500'}`}>
                      {roomState.isStarted ? '一時停止' : (elapsedTime === 0 ? '訓練開始' : '再開')}
                    </button>
                    <button onClick={() => updateState({ isStarted: false, startTime: null })} className="bg-slate-600 hover:bg-slate-500 px-3 rounded font-bold text-xs transition">
                      <i className="fas fa-undo"></i>
                    </button>
                  </div>
                )}
              </div>

              {/* 想定状況パネル */}
              <div className="bg-white rounded-lg shadow border border-slate-300 flex flex-col min-h-[250px] shrink-0">
                <div className="bg-slate-200 px-3 py-2 border-b border-slate-300 flex justify-between items-center shrink-0">
                  <span className="text-xs font-bold text-slate-700"><i className="fas fa-clipboard-list mr-1"></i>訓練想定</span>
                  {isController && <button onClick={generateScenario} className="text-xs bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded transition">想定生成</button>}
                </div>
                <div className="p-3 text-xs space-y-2 overflow-y-auto flex-1">
                  {roomState.scenario ? (
                    <>
                      <div className="flex flex-col"><span className="text-slate-400 font-bold scale-90 origin-left">対象物</span><span className="font-bold text-sm border-b pb-1">{roomState.scenario.building}</span></div>
                      <div className="flex flex-col"><span className="text-slate-400 font-bold scale-90 origin-left">日時・天候</span><span className="font-bold border-b pb-1">{roomState.scenario.time} / {roomState.scenario.weather}</span></div>
                      <div className="flex flex-col"><span className="text-slate-400 font-bold scale-90 origin-left">燃焼状況</span><span className="font-bold text-red-600 border-b pb-1">{roomState.scenario.condition}</span></div>
                      <div className="flex flex-col"><span className="text-slate-400 font-bold scale-90 origin-left">要救助者</span><span className="font-bold text-amber-600 border-b pb-1">{roomState.scenario.victim}</span></div>
                      <div className="flex flex-col"><span className="text-slate-400 font-bold scale-90 origin-left">特記事項</span><span className="font-bold">{roomState.scenario.hazard}</span></div>
                    </>
                  ) : <p className="text-slate-400 italic text-center mt-4">想定が設定されていません</p>}
                </div>
              </div>

              {/* 負荷（イベント）投下パネル - 統裁のみ表示 */}
              {isController && (
                <div className="bg-white rounded-lg shadow border border-red-200 flex flex-col h-[40vh] md:h-[450px] md:shrink-0 overflow-hidden">
                  <div className="bg-red-50 px-3 py-2 border-b border-red-200 text-xs font-bold text-red-800 flex items-center shrink-0">
                    <i className="fas fa-bolt mr-1"></i>状況付与（負荷）コントロール
                  </div>
                  <div className="p-2 overflow-y-auto flex-1 space-y-1 bg-slate-50">
                    <p className="text-[10px] text-slate-500 mb-2">クリックで参加隊全員に状況を送信します</p>
                    {scenarioData.loadEvents.map(ev => (
                      <button key={ev.id} onClick={() => triggerEvent(ev.text)} disabled={!roomState.isStarted}
                        className="w-full text-left text-xs bg-white border border-slate-300 p-2 rounded hover:border-red-500 hover:bg-red-50 transition group disabled:opacity-50 disabled:cursor-not-allowed">
                        <span className="font-bold text-slate-700 group-hover:text-red-700 block mb-0.5">{ev.title}</span>
                        <span className="text-[10px] text-slate-500 truncate block">{ev.text}</span>
                      </button>
                    ))}
                  </div>
                  <div className="p-2 bg-white border-t border-slate-200 shrink-0">
                    <div className="flex space-x-1">
                      <input type="text" value={customEventText} onChange={e=>setCustomEventText(e.target.value)} placeholder="自由入力で付与..." disabled={!roomState.isStarted}
                        className="flex-1 text-xs border rounded px-2 py-1 outline-none focus:border-red-500" />
                      <button onClick={()=>{triggerEvent(customEventText); setCustomEventText('');}} disabled={!customEventText.trim() || !roomState.isStarted}
                        className="bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded text-xs font-bold disabled:opacity-50">送信</button>
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* 2. 中央ペイン: 現場トランシーバー（全員共通） */}
            <div className={`flex flex-col bg-white rounded-lg shadow border border-slate-300 overflow-hidden w-full ${isController ? 'md:w-1/2' : 'md:w-2/3'} h-[60vh] md:h-full shrink-0`}>
              <div className="bg-slate-700 px-4 py-2 flex justify-between items-center text-white shrink-0">
                <span className="text-sm font-bold"><i className="fas fa-walkie-talkie mr-2"></i>現場トランシーバー (全体回線)</span>
                <span className="text-xs text-slate-300">参加全隊・統裁が閲覧可能</span>
              </div>
              
              <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-100">
                {messages.length === 0 ? <div className="text-center text-slate-400 mt-10 text-sm">通信履歴なし</div> : 
                  messages.map(msg => {
                    const isMe = msg.senderId === user.uid;
                    const isSystem = msg.senderId === 'system';
                    const isCtrl = msg.roleType === 'controller';
                    
                    if (isSystem) {
                      return (
                        <div key={msg.id} className="flex justify-center my-4">
                          <div className="bg-red-600 text-white text-xs font-bold px-4 py-2 rounded-full shadow-md max-w-[90%] border-2 border-red-400 shadow-[0_0_10px_rgba(220,38,38,0.5)] animate-pulse">
                            {msg.text}
                          </div>
                        </div>
                      );
                    }
                    
                    return (
                      <div key={msg.id} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'}`}>
                        <div className={`max-w-[85%] rounded-lg p-2.5 shadow-sm border ${isMe ? 'bg-blue-50 border-blue-200' : isCtrl ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-200'}`}>
                          <div className="flex justify-between items-baseline mb-1 space-x-4">
                            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${isCtrl ? 'bg-indigo-100 text-indigo-800' : 'bg-emerald-100 text-emerald-800'}`}>
                              {msg.callsign}
                            </span>
                            <span className="text-[10px] text-slate-400 font-mono">
                              {msg.timestamp?.toMillis ? new Date(msg.timestamp.toMillis()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : ''}
                            </span>
                          </div>
                          
                          {/* メッセージ本文 */}
                          {msg.text && <p className="text-sm text-slate-800 whitespace-pre-wrap">{msg.text}</p>}
                          
                          {/* 添付ファイル表示エリア */}
                          {msg.fileData && (
                            <div className={`mt-2 ${msg.text ? 'pt-2 border-t border-slate-200 border-dashed' : ''}`}>
                              {msg.fileType?.startsWith('image/') ? (
                                 <a href={msg.fileData} target="_blank" rel="noopener noreferrer">
                                   <img src={msg.fileData} alt={msg.fileName} className="max-w-full rounded border border-slate-200 object-contain hover:opacity-90 transition" style={{maxHeight: '200px'}} />
                                 </a>
                              ) : (
                                 <a href={msg.fileData} download={msg.fileName} className="flex items-center space-x-2 bg-white/50 p-2 rounded border border-slate-200 hover:bg-white transition inline-flex max-w-full">
                                   <i className="fas fa-file-alt text-[16px] text-slate-500 shrink-0"></i>
                                   <span className="text-xs font-medium text-blue-600 underline truncate">{msg.fileName}</span>
                                 </a>
                              )}
                            </div>
                          )}

                        </div>
                      </div>
                    );
                  })
                }
                <div ref={mainChatEndRef} />
              </div>
              
              {/* --- チャット入力＆ファイル添付エリア --- */}
              <div className="bg-white p-3 border-t border-slate-300 shrink-0 flex flex-col gap-2">
                
                {/* エラー表示 */}
                {fileError && (
                  <div className="text-xs text-red-600 bg-red-50 p-2 rounded flex justify-between items-center border border-red-200">
                    <span>{fileError}</span>
                    <button onClick={() => setFileError('')} className="p-1 hover:bg-red-100 rounded">
                      <i className="fas fa-times text-[14px]"></i>
                    </button>
                  </div>
                )}
                
                {/* 選択されたファイルのプレビュー */}
                {attachedFile && (
                  <div className="bg-blue-50 border border-blue-200 rounded p-2 flex justify-between items-center">
                    <div className="flex items-center space-x-2 overflow-hidden">
                      {attachedFile.type.startsWith('image/') ? 
                        <i className="fas fa-image text-[16px] text-blue-500 shrink-0"></i> : 
                        <i className="fas fa-file-alt text-[16px] text-blue-500 shrink-0"></i>
                      }
                      <span className="text-xs font-bold text-blue-800 truncate">{attachedFile.name}</span>
                    </div>
                    <button onClick={() => setAttachedFile(null)} className="p-1 hover:bg-blue-100 rounded text-blue-800">
                      <i className="fas fa-times text-[14px]"></i>
                    </button>
                  </div>
                )}

                <form onSubmit={sendMainMessage} className="flex space-x-2 items-center">
                  {/* 非表示のファイルインプット */}
                  <input type="file" ref={fileInputRef} onChange={handleFileSelect} className="hidden" accept="image/*,.pdf" />
                  
                  {/* ＋（添付）ボタン */}
                  <button type="button" onClick={() => fileInputRef.current?.click()} disabled={!roomState.isStarted} 
                    className="p-2 text-slate-500 hover:text-blue-600 hover:bg-slate-100 rounded-full transition disabled:opacity-50" title="画像やPDFを添付">
                    <i className="fas fa-plus-circle text-[22px]"></i>
                  </button>

                  {/* テキスト入力 */}
                  <input type="text" value={newMessage} onChange={e=>setNewMessage(e.target.value)} 
                    placeholder={roomState.isStarted ? "現場回線へ送信..." : "訓練開始までお待ちください"} disabled={!roomState.isStarted}
                    className="flex-1 border border-slate-300 rounded px-3 py-2 text-sm focus:border-blue-500 outline-none disabled:bg-slate-100" />
                  
                  {/* 送信ボタン */}
                  <button type="submit" disabled={(!newMessage.trim() && !attachedFile) || !roomState.isStarted} 
                    className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold transition disabled:opacity-50">
                    <i className="fas fa-paper-plane"></i>
                  </button>
                </form>
              </div>

            </div>

            {/* 3. 右ペイン: 統裁専用 裏回線（統裁のみ表示） */}
            {isController && (
              <div className="w-full md:w-1/4 flex flex-col bg-slate-900 rounded-lg shadow border border-slate-700 overflow-hidden h-[40vh] md:h-full shrink-0">
                <div className="bg-black px-3 py-2 flex justify-between items-center text-white shrink-0 border-b border-slate-700">
                  <span className="text-sm font-bold text-indigo-400"><i className="fas fa-user-secret mr-2"></i>統裁専用・裏回線</span>
                </div>
                
                <div className="flex-1 overflow-y-auto p-3 space-y-3">
                  <p className="text-[10px] text-slate-500 text-center mb-4">ここは参加隊には見えません。<br/>役割分担や状況付与の相談に使用してください。</p>
                  {ctrlMessages.map(msg => {
                    const isSystem = msg.senderId === 'system';
                    const isMe = msg.senderId === user.uid;
                    if (isSystem) {
                      return <div key={msg.id} className="text-[10px] text-slate-400 text-center">{msg.text}</div>;
                    }
                    return (
                      <div key={msg.id} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'}`}>
                        <div className={`max-w-[90%] rounded p-2 text-xs ${isMe ? 'bg-indigo-900 text-indigo-100' : 'bg-slate-800 text-slate-300'}`}>
                          <div className="flex justify-between mb-0.5 space-x-2">
                            <span className="font-bold text-[9px] opacity-70">{msg.callsign}</span>
                          </div>
                          <p className="whitespace-pre-wrap">{msg.text}</p>
                        </div>
                      </div>
                    );
                  })}
                  <div ref={ctrlChatEndRef} />
                </div>

                <div className="p-2 bg-slate-800 border-t border-slate-700 shrink-0">
                  <form onSubmit={sendCtrlMessage} className="flex space-x-2">
                    <input type="text" value={newCtrlMessage} onChange={e=>setNewCtrlMessage(e.target.value)} 
                      placeholder="裏回線で相談..." 
                      className="flex-1 bg-slate-700 text-white border border-slate-600 rounded px-2 py-1.5 text-xs focus:border-indigo-500 outline-none" />
                    <button type="submit" disabled={!newCtrlMessage.trim()} className="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded font-bold transition disabled:opacity-50">
                      <i className="fas fa-comment-dots"></i>
                    </button>
                  </form>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
