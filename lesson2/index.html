<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tactical Commander - オンライン図上訓練システム</title>
  
  <!-- Tailwind CSS (スタイリング用) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome (アイコン用) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (ブラウザ内でReact JSXを変換) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 印刷時のスタイル調整用 */
    @media print {
      .print\:hidden { display: none !important; }
      .print\:shadow-none { box-shadow: none !important; }
      .print\:border-none { border: none !important; }
      .print\:p-0 { padding: 0 !important; }
      .print\:pb-4 { padding-bottom: 1rem !important; }
      .print\:bg-white { background-color: white !important; }
      .print\:block { display: block !important; }
      .print\:h-auto { height: auto !important; }
      .print\:min-h-0 { min-height: 0 !important; }
      .print\:overflow-visible { overflow: visible !important; }
      .print\:resize-none { resize: none !important; }
      .print\:bg-transparent { background-color: transparent !important; }
      body { background-color: white !important; }
    }
  </style>
</head>
<body>
  <!-- Reactアプリが描画される場所 -->
  <div id="root"></div>

  <!-- ここからReactのプログラム (ES Modules対応) -->
  <script type="text/babel" data-type="module">
    // Firebase V9 モジュールのインポート
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, addDoc, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const { useState, useEffect, useRef } = React;

    // =========================================================================
    // ⚠️ Firebase設定（オンライン通信に必須）
    // =========================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyBENgEnO5E8F56FJKz8bt-I1LVG73I5PAM",
      authDomain: "tactical-commander-sim.firebaseapp.com",
      projectId: "tactical-commander-sim",
      storageBucket: "tactical-commander-sim.firebasestorage.app",
      messagingSenderId: "129443804844",
      appId: "1:129443804844:web:02f5c323b3081db4d1d109"
    };

    // 設定が行われているかどうかのチェック
    const isFirebaseConfigured = firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY";

    let app, auth, db;
    if (isFirebaseConfigured) {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    }
    const appId = 'tactical-commander-online';
    // =========================================================================

    // --- データ定義 ---
    const scenarioData = {
      buildings: ["木造2階建て一般住宅", "耐火造4階建て共同住宅", "5階建て雑居ビル", "大規模工場（一部危険物貯蔵）", "木造平屋建て空き家", "高層マンション（10階部分）", "地下街飲食店"],
      times: ["深夜（午前2時）", "早朝（午前6時）", "昼間（午後1時）", "夕方（午後6時）", "夜間（午後9時）"],
      weather: ["晴れ・無風・乾燥", "強風（風速10m/s以上）", "大雨", "降雪・路面凍結", "濃霧"],
      conditions: ["1階窓から黒煙と炎が激しく噴出", "2階部分から白煙がにじみ出ている", "屋上へ延焼の危険大", "建物全体が火の海（最盛期）", "外観上は異常なし、焦げ臭い匂いのみ", "隣接する木造家屋に延焼中"],
      victims: ["逃げ遅れ1名あり（2階寝室）", "情報錯綜、不在の可能性もあるが確証なし", "複数名がベランダで救助を求めている", "全員避難済み（関係者確認）", "不明（要検索）"],
      hazards: ["道路狭隘で消防車進入困難（ホース延長必要）", "最寄りの消火栓が工事中で使用不可", "付近に多数の野次馬で混乱", "プロパンガスボンベへの延焼危険あり", "特になし"],
      events: [
        "建物内部から「助けて！」という要救助者の声が聞こえる",
        "建物内部で「ドーン」という小規模な爆発音が発生する",
        "風向きが急変し、隣接建物への延焼危険が急激に高まる",
        "要救助者の家族が現場に駆けつけ、パニック状態で進入しようとする",
        "2階の床（1階の天井）が一部崩落する音がする",
        "付近の消火栓の水圧が急激に低下する",
        "これまで煙のなかった別の窓から、新たに濃煙が噴出し始める",
        "現場に到着した警察官から「中に人がいるかもしれない」と情報提供がある",
        "建物内から「シュー」というガスが漏れるような異音が聞こえる",
        "活動中の隊員から「熱気が急に強くなった」と緊急無線の報告が入る"
      ]
    };

    const evaluationCategories = [
      { id: "sizeup", name: "情報収集・状況判断", icon: <i className="fas fa-wave-square text-[18px]"></i> },
      { id: "initial", name: "初期手配・応援要請", icon: <i className="fas fa-walkie-talkie text-[18px]"></i> },
      { id: "tactics", name: "部隊配置・戦術決定", icon: <i className="fas fa-fire text-[18px]"></i> },
      { id: "safety", name: "安全管理・退避基準", icon: <i className="fas fa-shield-alt text-[18px]"></i> },
      { id: "communication", name: "隊員への指示・情報共有", icon: <i className="fas fa-users text-[18px]"></i> }
    ];

    const App = () => {
      // Firebaseが未設定の場合はエラー画面を表示
      if (!isFirebaseConfigured) {
        return (
          <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
            <div className="bg-red-50 border-l-4 border-red-500 p-6 max-w-lg w-full rounded shadow-lg">
              <h2 className="text-red-800 font-bold text-lg mb-2 flex items-center">
                <i className="fas fa-exclamation-triangle mr-2 text-[20px]"></i>
                Firebaseの設定が必要です
              </h2>
              <p className="text-sm text-red-700 mb-4 font-medium leading-relaxed">
                GitHub Pages等でオンライン通信機能を動作させるには、ご自身のFirebaseプロジェクトを作成し、HTMLファイル内の <code>firebaseConfig</code> を書き換える必要があります。
              </p>
            </div>
          </div>
        );
      }

      const [user, setUser] = useState(null);
      const [isInRoom, setIsInRoom] = useState(false);
      const [roomId, setRoomId] = useState('');
      const [userName, setUserName] = useState('');
      const [userRole, setUserRole] = useState('参加者');
      
      const [activeTab, setActiveTab] = useState('generator');
      const [messages, setMessages] = useState([]);
      const [newMessage, setNewMessage] = useState('');
      
      // シミュレーションの状態管理 (Firestore同期用)
      const [roomState, setRoomState] = useState({
        scenario: null,
        isStarted: false,
        startTime: null,
        timeLimit: 10,
        scheduledEvents: [],
        overallComment: ''
      });
      
      const [elapsedTime, setElapsedTime] = useState(0);
      const [timeRemaining, setTimeRemaining] = useState(10 * 60);
      
      // ジェネレーター用のローカルState
      const [newEventMin, setNewEventMin] = useState(''); 
      const [newEventSec, setNewEventSec] = useState(''); 
      const [newEventText, setNewEventText] = useState(''); 
      const [showPrintMessage, setShowPrintMessage] = useState(false);

      // ファイルアップロード用State
      const [attachedFile, setAttachedFile] = useState(null);
      const [fileError, setFileError] = useState('');
      const fileInputRef = useRef(null);

      const chatEndRef = useRef(null);
      
      // --- 役割の判定（複数コントローラー対応） ---
      const isController = ['メイン統裁', 'サブ統裁', 'コントローラー(統裁)'].includes(userRole);
      // 自動イベントの発火やタイムアップ処理は「メイン統裁」の端末でのみ実行し、二重発動を防ぐ
      const isMainController = ['メイン統裁', 'コントローラー(統裁)'].includes(userRole);
      const isObserver = userRole === '見学者';

      // --- Auth ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (e) { console.error("Auth error", e); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // --- Fetch Data ---
      useEffect(() => {
        if (!user || !isInRoom || !roomId) return;
        
        // Messages
        const messagesRef = collection(db, 'artifacts', appId, 'public', 'data', `room_${roomId}_messages`);
        const unsubscribeMsgs = onSnapshot(query(messagesRef), (snapshot) => {
          const msgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          msgs.sort((a, b) => {
            const timeA = a.timestamp?.toMillis ? a.timestamp.toMillis() : 0;
            const timeB = b.timestamp?.toMillis ? b.timestamp.toMillis() : 0;
            return timeA - timeB;
          });
          setMessages(msgs);
        });

        // Room State
        const roomDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'room_states', roomId);
        const unsubscribeRoom = onSnapshot(roomDocRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            setRoomState({
              scenario: data.scenario || null,
              isStarted: !!data.isStarted,
              startTime: data.startTime || null,
              timeLimit: data.timeLimit || 10,
              scheduledEvents: data.scheduledEvents || [],
              overallComment: data.overallComment || ''
            });
          }
        });

        return () => { unsubscribeMsgs(); unsubscribeRoom(); };
      }, [user, isInRoom, roomId]);

      // --- Timer & Event Trigger ---
      useEffect(() => {
        let interval;
        if (roomState.isStarted && roomState.startTime) {
          interval = setInterval(() => {
            const elapsed = Math.max(0, Math.floor((Date.now() - roomState.startTime) / 1000));
            setElapsedTime(elapsed);
            const remaining = Math.max(0, roomState.timeLimit * 60 - elapsed);
            setTimeRemaining(remaining);
            
            // ⚠️ メイン統裁の端末でのみ自動イベント判定と発火を実行（二重発火防止）
            if (isMainController && roomState.scheduledEvents) {
              const newlyTriggered = roomState.scheduledEvents.filter(ev => !ev.isTriggered && elapsed >= ev.triggerTime);
              if (newlyTriggered.length > 0) {
                newlyTriggered.forEach(ev => {
                  sendSystemMessage(`【状況変化】 ${ev.text}`);
                });
                const updatedEvents = roomState.scheduledEvents.map(ev => 
                  newlyTriggered.find(n => n.id === ev.id) ? { ...ev, isTriggered: true, triggeredAt: formatTime(elapsed) } : ev
                );
                updateRoomState({ scheduledEvents: updatedEvents });
              }
            }
            
            // タイムアップ判定
            if (remaining === 0 && roomState.isStarted && isMainController) {
              updateRoomState({ isStarted: false });
              sendSystemMessage("【訓練終了】 制限時間に到達しました。訓練を終了します。");
            }
          }, 1000);
        } else {
          setElapsedTime(0);
          setTimeRemaining(roomState.timeLimit * 60);
        }
        return () => clearInterval(interval);
      }, [roomState.isStarted, roomState.startTime, roomState.timeLimit, isMainController, roomState.scheduledEvents]);

      const formatTime = (totalSeconds) => {
        const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
        const s = (totalSeconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      };

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      // --- File Processing ---
      const compressImage = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = event => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 800;
              const MAX_HEIGHT = 800;
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
              } else {
                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
              }
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              resolve(canvas.toDataURL('image/jpeg', 0.7));
            }
          };
          reader.onerror = error => reject(error);
        });
      };

      const readFileAsBase64 = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => resolve(reader.result);
          reader.onerror = error => reject(error);
        });
      };

      const handleFileSelect = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setFileError('');
        if (!file.type.startsWith('image/') && file.size > 700000) {
          setFileError("PDF等のファイルは700KB以下にしてください。");
          if (fileInputRef.current) fileInputRef.current.value = '';
          return;
        }

        try {
          let fileData;
          if (file.type.startsWith('image/')) {
            fileData = await compressImage(file);
          } else {
            fileData = await readFileAsBase64(file);
          }
          
          setAttachedFile({
            data: fileData,
            name: file.name,
            type: file.type
          });
        } catch (err) {
          console.error("ファイル読み込みエラー", err);
          setFileError("ファイルの読み込みに失敗しました。");
        }
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      // --- Actions ---
      const updateRoomState = async (updates) => {
        const roomDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'room_states', roomId);
        await setDoc(roomDocRef, updates, { merge: true });
      };

      const sendSystemMessage = async (text) => {
        const messagesRef = collection(db, 'artifacts', appId, 'public', 'data', `room_${roomId}_messages`);
        await addDoc(messagesRef, { text, senderId: 'system', senderName: 'SYSTEM', senderRole: '統裁部', timestamp: serverTimestamp() });
      };

      const sendMessage = async (e) => {
        e.preventDefault();
        if (!user || (!newMessage.trim() && !attachedFile) || !roomId) return;
        const messagesRef = collection(db, 'artifacts', appId, 'public', 'data', `room_${roomId}_messages`);
        
        const msgObj = {
          text: newMessage,
          senderId: user.uid,
          senderName: userName,
          senderRole: userRole,
          timestamp: serverTimestamp(),
          score: 0,
          category: 'sizeup',
          feedback: ''
        };

        if (attachedFile) {
          msgObj.fileData = attachedFile.data;
          msgObj.fileName = attachedFile.name;
          msgObj.fileType = attachedFile.type;
        }

        try {
          await addDoc(messagesRef, msgObj);
          setNewMessage('');
          setAttachedFile(null);
        } catch (e) {
          console.error("Error sending message", e);
          setFileError("送信に失敗しました。ファイルサイズが大きすぎる可能性があります。");
        }
      };

      const updateMessageEval = async (msgId, updates) => {
        const msgRef = doc(db, 'artifacts', appId, 'public', 'data', `room_${roomId}_messages`, msgId);
        await updateDoc(msgRef, updates);
      };

      // --- Scenario Generator ---
      const generateScenario = async () => {
        const randomSelect = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const newScenario = {
          building: randomSelect(scenarioData.buildings),
          time: randomSelect(scenarioData.times),
          weather: randomSelect(scenarioData.weather),
          condition: randomSelect(scenarioData.conditions),
          victim: randomSelect(scenarioData.victims),
          hazard: randomSelect(scenarioData.hazards),
          generatedAt: new Date().toLocaleString()
        };

        const eventCount = Math.floor(Math.random() * 2) + 2;
        const shuffledEvents = [...scenarioData.events].sort(() => 0.5 - Math.random()).slice(0, eventCount);
        const totalSeconds = roomState.timeLimit * 60;
        const minTime = totalSeconds * 0.1;
        const maxTime = totalSeconds * 0.9;
        
        const initialEvents = shuffledEvents.map((text, index) => {
           const triggerTime = Math.floor(minTime + Math.random() * (maxTime - minTime));
           return { id: `evt-${Date.now()}-${index}`, triggerTime, text, isTriggered: false };
        }).sort((a, b) => a.triggerTime - b.triggerTime);

        await updateRoomState({
          scenario: newScenario,
          scheduledEvents: initialEvents,
          isStarted: false,
          startTime: null
        });
      };

      const addCustomEvent = async () => {
        if (!newEventText.trim()) return;
        const min = parseInt(newEventMin) || 0;
        const sec = parseInt(newEventSec) || 0;
        const triggerTime = min * 60 + sec;

        const newEvent = { id: `evt-custom-${Date.now()}`, triggerTime, text: newEventText, isTriggered: false };
        const updated = [...(roomState.scheduledEvents || []), newEvent].sort((a, b) => a.triggerTime - b.triggerTime);
        
        await updateRoomState({ scheduledEvents: updated });
        setNewEventText(''); setNewEventMin(''); setNewEventSec('');
      };

      const removeCustomEvent = async (id) => {
        const updated = (roomState.scheduledEvents || []).filter(ev => ev.id !== id);
        await updateRoomState({ scheduledEvents: updated });
      };

      // --- Results Calculation ---
      const calculateResults = () => {
        const evaluatedCommands = messages.filter(c => c.score && c.score > 0 && c.senderId !== 'system');
        const totalScore = evaluatedCommands.reduce((sum, c) => sum + c.score, 0);
        const maxScore = evaluatedCommands.length * 5;
        const percentage = maxScore > 0 ? Math.round((totalScore / maxScore) * 100) : 0;

        const categoryScores = evaluationCategories.map(cat => {
          const catCommands = evaluatedCommands.filter(c => c.category === cat.id);
          const catTotal = catCommands.reduce((sum, c) => sum + c.score, 0);
          const catMax = catCommands.length * 5;
          return {
            ...cat,
            score: catTotal,
            max: catMax,
            percentage: catMax > 0 ? Math.round((catTotal / catMax) * 100) : 0,
            count: catCommands.length
          };
        });

        return { totalScore, maxScore, percentage, categoryScores, evaluatedCount: evaluatedCommands.length, evaluatedCommands };
      };

      const results = calculateResults();

      // --- Views ---
      if (!isInRoom) {
        return (
          <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
            <div className="bg-slate-800 border border-slate-700 rounded-xl p-8 max-w-md w-full shadow-2xl text-white">
              <div className="flex items-center justify-center mb-6">
                <i className="fas fa-fire text-[32px] text-red-500 mr-3"></i>
                <h1 className="text-xl font-bold tracking-wider">Tactical Commander</h1>
              </div>
              <p className="text-slate-400 text-sm text-center mb-8">オンライン指揮統制評価ルーム</p>
              <form onSubmit={(e) => { e.preventDefault(); if(roomId && userName) setIsInRoom(true); }} className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">ROOM ID</label>
                  <input type="text" value={roomId} onChange={(e) => setRoomId(e.target.value)} required
                    className="w-full bg-slate-900 border border-slate-700 rounded px-4 py-2 text-white focus:border-red-500 outline-none" placeholder="例: Alpha-1" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">コールサイン（名前）</label>
                  <input type="text" value={userName} onChange={(e) => setUserName(e.target.value)} required
                    className="w-full bg-slate-900 border border-slate-700 rounded px-4 py-2 text-white focus:border-red-500 outline-none" placeholder="例: 第一小隊長" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">役割</label>
                  <select value={userRole} onChange={(e) => setUserRole(e.target.value)}
                    className="w-full bg-slate-900 border border-slate-700 rounded px-4 py-2 text-white focus:border-red-500 outline-none">
                    <option value="参加者">参加者（訓練生）</option>
                    <option value="メイン統裁">メイン統裁（進行・評価）※ルームに代表1名</option>
                    <option value="サブ統裁">サブ統裁（チャット対応・評価）※増員用</option>
                    <option value="指令センター">指令センター</option>
                    <option value="見学者">見学者（閲覧のみ）</option>
                  </select>
                </div>
                <button type="submit" disabled={!user}
                  className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded mt-6 transition disabled:opacity-50">
                  {user ? 'ルームに入室' : '認証中...'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 flex flex-col print:bg-white print:block print:min-h-0 print:h-auto">
          {/* Header */}
          <header className="bg-slate-900 text-white shadow-md z-10 print:hidden">
            <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center">
              <div className="flex items-center space-x-3 mb-3 md:mb-0">
                <div className="bg-red-600 p-2 rounded-lg">
                  <i className="fas fa-fire text-[24px] text-white"></i>
                </div>
                <div>
                  <h1 className="text-xl font-bold tracking-wider leading-none">Tactical Commander</h1>
                  <p className="text-[10px] text-slate-400 font-medium">消防隊長 指揮統制・戦術評価システム ONLINE</p>
                </div>
              </div>
              
              <div className="flex items-center space-x-4">
                <div className="bg-slate-800 px-3 py-1.5 rounded border border-slate-700 flex items-center space-x-2 text-xs">
                  <span className="text-slate-400 font-bold">ROOM:</span>

                                <div className="flex justify-between items-baseline mb-1 space-x-4">
                                  <span className="text-[10px] font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">{msg.senderRole} : {msg.senderName}</span>
                                  <span className="text-[10px] text-slate-400">{msg.timestamp?.toMillis ? new Date(msg.timestamp.toMillis()).toLocaleTimeString() : '...'}</span>
                                </div>
                                {msg.text && <p className="text-sm text-slate-800 font-medium">{msg.text}</p>}
                                
                                {/* 添付ファイル表示 */}
                                {msg.fileData && (
                                  <div className={`mt-2 ${msg.text ? 'pt-2 border-t border-slate-200 border-dashed' : ''}`}>
                                    {msg.fileType?.startsWith('image/') ? (
                                       <a href={msg.fileData} target="_blank" rel="noopener noreferrer">
                                         <img src={msg.fileData} alt={msg.fileName} className="max-w-full rounded border border-slate-200 object-contain hover:opacity-90 transition" style={{maxHeight: '200px'}} />
                                       </a>
                                    ) : (
                                       <a href={msg.fileData} download={msg.fileName} className="flex items-center space-x-2 bg-slate-50 p-2 rounded border border-slate-200 hover:bg-slate-100 transition inline-flex max-w-full">
                                         <i className="fas fa-file-alt text-[16px] text-slate-500 shrink-0"></i>
                                         <span className="text-xs font-medium text-blue-600 underline truncate">{msg.fileName}</span>
                                       </a>
                                    )}
                                  </div>
                                )}
                              </div>
                              
                              {/* 評価パネル (参加者の発言に対してのみ表示) */}
                              {msg.senderRole === '参加者' && (
                                <div className={`mt-1 bg-slate-50 border border-emerald-200 rounded p-2 shadow-sm w-full relative ${msg.score > 0 ? 'bg-emerald-50' : ''}`}>
                                  <div className="absolute left-0 top-0 bottom-0 w-1 bg-emerald-400 rounded-l"></div>
                                  <div className="pl-2 flex flex-col gap-2">
                                    <div className="flex justify-between items-center">
                                      <select value={msg.category || 'sizeup'} onChange={(e) => updateMessageEval(msg.id, {category: e.target.value})} className="text-xs border border-slate-300 rounded p-1 outline-none bg-white">
                                        {evaluationCategories.map(cat => <option key={cat.id} value={cat.id}>{cat.name}</option>)}
                                      </select>
                                      <div className="flex space-x-1 bg-white p-0.5 rounded-full border border-slate-200">
                                        {[1,2,3,4,5].map(s => (
                                          <button key={s} onClick={() => updateMessageEval(msg.id, {score: s})} className={`w-6 h-6 rounded-full text-xs font-bold transition-all ${msg.score === s ? 'bg-red-600 text-white shadow transform scale-110' : 'text-slate-400 hover:bg-slate-100'}`}>
                                            {s}
                                          </button>
                                        ))}
                                      </div>
                                    </div>
                                    <input type="text" placeholder="評価フィードバック (任意)" defaultValue={msg.feedback || ''} onBlur={(e) => updateMessageEval(msg.id, {feedback: e.target.value})}
                                      className="w-full text-xs border-b border-slate-300 bg-transparent py-1 px-1 focus:border-red-500 outline-none" />
                                  </div>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      ))}
                      <div ref={chatEndRef} />
                    </div>
                    
                    <div className="bg-white p-3 border-t border-slate-300 flex flex-col gap-2">
                      {fileError && (
                        <div className="text-xs text-red-600 bg-red-50 p-2 rounded flex justify-between items-center border border-red-200">
                          <span>{fileError}</span>
                          <button onClick={() => setFileError('')} className="p-1 hover:bg-red-100 rounded">
                            <i className="fas fa-times text-[14px]"></i>
                          </button>
                        </div>
                      )}
                      {attachedFile && (
                        <div className="bg-blue-50 border border-blue-200 rounded p-2 flex justify-between items-center">
                          <div className="flex items-center space-x-2 overflow-hidden">
                            {attachedFile.type.startsWith('image/') ? 
                              <i className="fas fa-image text-[16px] text-blue-500 shrink-0"></i> : 
                              <i className="fas fa-file-alt text-[16px] text-blue-500 shrink-0"></i>
                            }
                            <span className="text-xs font-bold text-blue-800 truncate">{attachedFile.name}</span>
                          </div>
                          <button onClick={() => setAttachedFile(null)} className="p-1 hover:bg-blue-100 rounded text-blue-800">
                            <i className="fas fa-times text-[14px]"></i>
                          </button>
                        </div>
                      )}
                      <form onSubmit={sendMessage} className="flex space-x-2 items-center">
                        <input type="file" ref={fileInputRef} onChange={handleFileSelect} className="hidden" accept="image/*,.pdf" />
                        <button type="button" onClick={() => fileInputRef.current?.click()} disabled={!roomState.isStarted} className="p-2 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-full transition disabled:opacity-50" title="写真やPDFを添付">
                          <i className="fas fa-paperclip text-[20px]"></i>
                        </button>
                        <input type="text" value={newMessage} onChange={(e) => setNewMessage(e.target.value)} placeholder="統裁から参加者へのチャット・指示..." disabled={!roomState.isStarted}
                          className="flex-1 border border-slate-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-slate-500 outline-none disabled:bg-slate-100" />
                        <button type="submit" disabled={(!newMessage.trim() && !attachedFile) || !roomState.isStarted} className="bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-700 disabled:opacity-50 transition">
                          <i className="fas fa-paper-plane text-[18px]"></i>
                        </button>
                      </form>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* --- 統裁画面: タブ3 (評価レポート) --- */}
            {isController && activeTab === 'report' && (
              <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 bg-white rounded-xl shadow-lg border border-slate-200 p-8 print:shadow-none print:border-none print:p-0 print:block print:h-auto">
                <div className="border-b-2 border-slate-800 pb-6 mb-6 text-center">
                  <h1 className="text-3xl font-black text-slate-900 tracking-wider mb-2">指揮統制評価レポート</h1>
                  <p className="text-slate-500 font-medium">TACTICAL COMMANDER EVALUATION</p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                  <div className="md:col-span-1 bg-slate-900 rounded-xl p-6 text-white flex flex-col justify-center items-center text-center shadow-inner">
                    <i className="fas fa-award text-[48px] text-amber-400 mb-2"></i>
                    <p className="text-sm font-bold text-slate-300 mb-1">総合評価</p>
                    <div className="flex items-baseline space-x-2"><span className="text-5xl font-black">{results.percentage}</span><span className="text-xl text-slate-400">%</span></div>
                    <p className="text-xs text-slate-400 mt-2">{results.totalScore} / {results.maxScore} pts ({results.evaluatedCount}件の指示を評価)</p>
                  </div>

                  <div className="md:col-span-2 space-y-4">
                    <h3 className="text-sm font-bold text-slate-700 border-b border-slate-200 pb-2">カテゴリー別評価</h3>
                    {results.categoryScores.map(cat => (
                      <div key={cat.id} className="flex items-center">
                        <div className="w-40 flex items-center space-x-2 text-sm font-medium text-slate-600">{cat.icon}<span className="truncate">{cat.name}</span></div>
                        <div className="flex-1 ml-4 relative h-4 bg-slate-100 rounded-full overflow-hidden">
                          <div className={`absolute top-0 left-0 h-full rounded-full transition-all duration-1000 ${cat.percentage >= 80 ? 'bg-emerald-500' : cat.percentage >= 60 ? 'bg-blue-500' : cat.percentage >= 40 ? 'bg-amber-500' : cat.percentage > 0 ? 'bg-red-500' : 'bg-slate-300'}`} style={{ width: `${cat.percentage}%` }}></div>
                        </div>
                        <div className="w-16 text-right text-sm font-bold text-slate-700 ml-4">{cat.count > 0 ? `${cat.percentage}%` : '-'}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {roomState.scenario && (
                  <div className="mb-8">
                    <h3 className="text-lg font-bold text-slate-800 mb-3 border-l-4 border-slate-800 pl-3">訓練想定状況</h3>
                    <div className="bg-slate-50 rounded-lg p-4 border border-slate-200 text-sm grid grid-cols-2 gap-4">
                      <div><span className="text-slate-500 mr-2">対象物:</span> <span className="font-bold">{roomState.scenario.building}</span></div>
                      <div><span className="text-slate-500 mr-2">日時・天候:</span> <span className="font-bold">{roomState.scenario.time} / {roomState.scenario.weather}</span></div>
                      <div><span className="text-slate-500 mr-2">燃焼状況:</span> <span className="font-bold">{roomState.scenario.condition}</span></div>
                      <div><span className="text-slate-500 mr-2">要救助者:</span> <span className="font-bold">{roomState.scenario.victim}</span></div>
                      <div className="col-span-2"><span className="text-slate-500 mr-2">特記事項:</span> <span className="font-bold text-red-600">{roomState.scenario.hazard}</span></div>
                    </div>
                  </div>
                )}

                <div className="mb-8">
                  <h3 className="text-lg font-bold text-slate-800 mb-4 border-l-4 border-slate-800 pl-3">評価済みタイムライン詳細</h3>
                  <div className="space-y-0 border-l-2 border-slate-200 ml-3">
                    {results.evaluatedCommands.map((cmd) => {
                      const category = evaluationCategories.find(c => c.id === cmd.category);
                      return (
                        <div key={cmd.id} className="relative pl-6 pb-6 break-inside-avoid">
                          <div className="absolute left-[-5px] top-1 w-2 h-2 rounded-full bg-slate-400"></div>
                          <div className="flex flex-col md:flex-row md:items-baseline mb-1">
                            <span className="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded border border-slate-200 mr-3">{category?.name}</span>
                            <span className="text-xs font-bold text-white bg-slate-700 px-2 py-0.5 rounded">評価: {cmd.score}/5</span>
                          </div>
                          <p className="text-slate-800 font-bold mb-1 ml-2">
                            {cmd.text && `「${cmd.text}」`}
                            {cmd.fileName && <span className="text-blue-600 ml-2 border border-blue-200 bg-blue-50 px-1 rounded text-xs inline-flex items-center"><i className="fas fa-paperclip text-[10px] mr-1"></i>{cmd.fileName}</span>}
                            <span className="text-xs font-normal text-slate-400 ml-1">({cmd.senderName})</span>
                          </p>
                          {cmd.feedback && (
                            <p className="text-sm text-slate-600 bg-blue-50 p-2 rounded ml-2 border-l-2 border-blue-400 inline-block"><span className="font-bold text-blue-800 mr-1">講評:</span>{cmd.feedback}</p>
                          )}
                        </div>
                      );
                    })}
                    {results.evaluatedCommands.length === 0 && <p className="text-slate-500 italic pl-6">スコアが付けられた指示記録はありません。</p>}
                  </div>
                </div>

                <div>
                  <h3 className="text-lg font-bold text-slate-800 mb-3 border-l-4 border-slate-800 pl-3">総合所見</h3>
                  {/* 印刷用の表示（通常時は隠す） */}
                  <div className="hidden print:block whitespace-pre-wrap text-sm text-slate-800 min-h-[50px]">
                    {roomState.overallComment || '（所見なし）'}
                  </div>
                  {/* 画面用の入力欄（印刷時は隠す） */}
                  <textarea defaultValue={roomState.overallComment} onBlur={(e) => updateRoomState({overallComment: e.target.value})} placeholder="訓練全体の指揮統制に対する講評を入力してください。"
                    className="w-full h-32 border border-slate-300 rounded p-4 text-sm focus:ring-2 focus:ring-red-500 outline-none resize-none bg-slate-50 print:hidden"></textarea>
                </div>
                
                <div className="mt-8 flex justify-end relative print:hidden">
                  {showPrintMessage && (
                    <div className="absolute right-0 bottom-16 bg-blue-50 border border-blue-200 text-blue-800 px-4 py-3 rounded-lg shadow-lg z-10 w-80 animate-in fade-in slide-in-from-bottom-2 text-left">
                      <p className="text-sm font-bold mb-1 flex items-center">
                        <i className="fas fa-exclamation-triangle text-[16px] text-blue-500 mr-1"></i>
                        印刷画面が開かない場合
                      </p>
                      <p className="text-xs">
                        現在の環境ではボタンから印刷画面が開けない場合があります。<br/>
                        お手数ですが、キーボードの <strong className="bg-white px-1 border rounded mx-0.5">Ctrl + P</strong>（Macは <strong className="bg-white px-1 border rounded mx-0.5">Command + P</strong>）を押してブラウザの印刷機能をお試しください。
                      </p>
                    </div>
                  )}
                  <button onClick={() => {
                    try { window.print(); } catch(e) { console.error(e); }
                    setShowPrintMessage(true);
                    setTimeout(() => setShowPrintMessage(false), 8000);
                  }} className="bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-lg font-bold shadow-md transition flex items-center space-x-2">
                    <i className="fas fa-clipboard-check text-[18px]"></i>
                    <span>このレポートを印刷 / PDF保存</span>
                  </button>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
